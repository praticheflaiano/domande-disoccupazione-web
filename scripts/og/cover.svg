<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Soft dots pattern -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="1050" cy="120" r="180"/>
    <circle cx="140" cy="510" r="220"/>
  </g>

  <!-- Logo mark CF -->
  <g transform="translate(80, 80)">
    <rect width="86" height="86" rx="18" fill="url(#accent)"/>
    <text x="43" y="60" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" text-anchor="middle" fill="#0f172a">CF</text>
  </g>

  <!-- Wordmark -->
  <g transform="translate(180, 92)">
    <text font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="3" fill="#ffffff">CENTRO PRATICHE</text>
    <text y="36" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="5" fill="#5eead4">FLAIANO</text>
  </g>

  <!-- Main headline -->
  <text x="80" y="280" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="900" fill="#ffffff" letter-spacing="-2">
    NASpI 2026
  </text>
  <text x="80" y="360" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="600" fill="#e2e8f0">
    Calcolo, requisiti e domanda online
  </text>

  <!-- Key stats badges -->
  <g transform="translate(80, 440)">
    <rect width="260" height="70" rx="18" fill="#ffffff" opacity="0.12"/>
    <text x="22" y="30" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#5eead4">MASSIMALE 2026</text>
    <text x="22" y="58" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#ffffff">€ 1.584,70 / mese</text>

    <rect x="280" width="260" height="70" rx="18" fill="#ffffff" opacity="0.12"/>
    <text x="302" y="30" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#5eead4">SCADENZA DOMANDA</text>
    <text x="302" y="58" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#ffffff">68 giorni</text>

    <rect x="560" width="260" height="70" rx="18" fill="#ffffff" opacity="0.12"/>
    <text x="582" y="30" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#5eead4">DURATA MAX</text>
    <text x="582" y="58" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#ffffff">24 mesi</text>
  </g>

  <!-- Domain watermark -->
  <text x="1120" y="570" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="end" fill="#94a3b8">
    domandedisoccupazione.it
  </text>
</svg>
